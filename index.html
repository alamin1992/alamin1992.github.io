<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ALAMIN</title>
  <meta name="description" content="Alamin Abu Zaman - 2nd Line Support Engineer & QA Specialist"/>
  <meta name="keywords" content="2nd Line Support, QA Engineer, Vimond, Jira, Zendesk, HubSpot."/>
  <meta name="author" content="Alamin Abu Zaman" />
  <link rel="icon" href="./favicon.png" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Syne:wght@700;800&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--bg:#0d0f14;--bg2:#13161d;--bg3:#1a1e28;--accent:#4f8ef7;--accent2:#7b5ea7;--glow:rgba(79,142,247,0.25);--text:#e8eaf0;--muted:#9aa3be;--border:rgba(255,255,255,0.07);--nav-bg:rgba(13,15,20,0.92);--shadow:rgba(0,0,0,0.5)}
    body.light-mode{--bg:#eef1f8;--bg2:#ffffff;--bg3:#e2e6f3;--accent:#2d6ee8;--accent2:#6b4d9a;--glow:rgba(45,110,232,0.2);--text:#111827;--muted:#4b5563;--border:rgba(0,0,0,0.1);--nav-bg:rgba(240,243,252,0.95);--shadow:rgba(0,0,0,0.12)}
    html{scroll-behavior:smooth}
    body{font-family:"Space Grotesk",sans-serif;background:var(--bg);color:var(--text);overflow-x:hidden;transition:background 0.3s,color 0.3s}
    #root{min-height:100vh}
    @keyframes fadeUp{from{opacity:0;transform:translateY(28px)}to{opacity:1;transform:translateY(0)}}
    @keyframes float {0%,100%{transform:translateY(0px)}50%{transform:translateY(-12px)}}
    nav{position:fixed;top:0;width:100%;z-index:200;background:var(--nav-bg);backdrop-filter:blur(16px);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 2.5rem;height:60px;transition:background 0.3s}
    .logo{width:38px;height:38px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;font-family:"Syne",sans-serif;font-weight:700;color:#fff;cursor:pointer;font-size:0.9rem}
    .nav-links{display:flex;gap:2.2rem;list-style:none}
    .nav-links button{background:none;border:none;cursor:pointer;color:var(--muted);font-family:"Space Grotesk",sans-serif;font-size:.9rem;font-weight:600;padding:4px 0;position:relative;transition:color 0.3s ease}
    .nav-links button::after{content:"";position:absolute;bottom:-2px;left:0;right:0;height:2px;border-radius:2px;background:linear-gradient(90deg,var(--accent),var(--accent2));transform:scaleX(0);transition:transform 0.3s ease}
    .nav-links button.active,.nav-links button:hover{color:var(--text)}
    .nav-links button.active::after,.nav-links button:hover::after{transform:scaleX(1)}
    .logo-img{height:42px;width:42px;object-fit:contain;border-radius:50%;border:2px solid var(--accent);background:var(--bg2);padding:2px;box-shadow:0 0 12px var(--glow);transition:all 0.3s}
    section{min-height:100vh;padding:100px 2.5rem 60px;display:flex;flex-direction:column;align-items:center;justify-content:center}
    #home{text-align:center;gap:1.6rem;animation:fadeUp .9s ease both}
    #about{align-items:center}
    #activities{margin-top:0;padding-top:80px}
    .avatar-ring{width:190px;height:190px;border-radius:50%;margin:0 auto;box-shadow:0 10px 40px rgba(79,142,247,0.25);background:linear-gradient(135deg,var(--accent),var(--accent2));padding:3px;animation:float 3s ease-in-out infinite}
    .avatar-inner{width:100%;height:100%;border-radius:50%;overflow:hidden;background:var(--bg3)}
    .avatar-inner img{width:100%;height:100%;object-fit:cover}
    .hero-name{font-family:"Syne",sans-serif;font-weight:800;font-size:clamp(2.4rem,6vw,4rem);background:linear-gradient(135deg,var(--accent) 30%,var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
    .hero-title{color:var(--muted);font-size:1.05rem;letter-spacing:.04em}
    .hero-contact{display:flex;flex-wrap:wrap;gap:.6rem;justify-content:center;margin-top:.3rem}
    .contact-chip{display:flex;align-items:center;gap:.5rem;background:var(--bg3);border:1px solid var(--border);border-radius:30px;padding:.45rem 1rem;font-size:.82rem;color:var(--muted);text-decoration:none;transition:all .2s}
    .contact-chip:hover{border-color:var(--accent);color:var(--text)}
    .contact-chip i{color:var(--accent);font-size:.88rem}
    .social-row{display:flex;gap:1rem;justify-content:center;margin-top:.4rem}
    .social-btn{width:46px;height:46px;border-radius:50%;background:var(--bg3);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;color:var(--muted);text-decoration:none;transition:all .2s}
    .social-btn:hover{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;border-color:transparent;transform:translateY(-2px)}
    .sec-title{font-family:"Syne",sans-serif;font-weight:800;font-size:clamp(2rem,5vw,3rem);background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:2rem}
    .about-bio{color:var(--muted);line-height:1.85;font-size:1rem;max-width:780px;margin:0 auto 3rem;text-align:center;width:100%}
    .info-section-title,.skills-section-title{font-family:"Syne",sans-serif;font-weight:700;font-size:1.4rem;color:var(--accent);margin-bottom:1.2rem;width:100%;text-align:center}
    .skills-section-title{font-size:1.3rem;margin:1.2rem 0 .8rem}
    .info-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1rem;width:100%;max-width:900px;margin:0 auto}
    .info-card{background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:1.2rem 1.4rem;display:flex;align-items:center;gap:1rem;transition:all .25s}
    .info-card:hover{border-color:var(--accent);transform:translateY(-2px);box-shadow:0 0 0 1px var(--accent),0 8px 24px var(--glow)}
    .info-icon{width:42px;height:42px;border-radius:12px;background:rgba(79,142,247,.12);display:flex;align-items:center;justify-content:center;color:var(--accent);font-size:1.1rem;flex-shrink:0;transition:all .25s}
    .info-card:hover .info-icon{background:var(--accent);color:#fff;transform:scale(1.15) rotate(-8deg);box-shadow:0 4px 14px var(--glow)}
    .info-label{font-size:.7rem;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:3px}
    .info-value{font-size:.95rem;font-weight:600;color:var(--text)}
    .exp-block{width:100%;max-width:900px;margin:0 auto 1.6rem}
    .exp-header{display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:.5rem;margin-bottom:.5rem}
    .exp-company{font-family:"Syne",sans-serif;font-weight:700;font-size:1.05rem;color:var(--text)}
    .exp-role{color:var(--accent);font-weight:600;font-size:.95rem;margin-bottom:.4rem}
    .exp-period{background:rgba(79,142,247,.1);border:1px solid rgba(79,142,247,.25);border-radius:20px;padding:3px 12px;font-size:.78rem;color:var(--accent);white-space:nowrap}
    .exp-list{list-style:none;display:flex;flex-direction:column;gap:.5rem}
    .exp-list li{display:flex;align-items:flex-start;gap:.7rem;color:var(--muted);font-size:.92rem;line-height:1.6}
    .exp-list li::before{content:"\25B8";color:var(--accent);flex-shrink:0;margin-top:2px}
    .exp-divider{border:none;border-top:1px solid var(--border);margin:1.2rem 0}
    .skills-grid{display:flex;flex-wrap:wrap;gap:.6rem;width:100%;max-width:900px;margin:0 auto 1.5rem;justify-content:center}
    .skill-tag{background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:.45rem 1rem;font-size:.85rem;color:var(--muted);transition:all .2s;cursor:default}
    .skill-tag:hover{border-color:var(--accent);color:var(--text);background:rgba(79,142,247,.08)}
    .edu-card{width:100%;max-width:900px;background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:1.4rem 1.6rem;margin:0 auto 1rem;display:flex;align-items:center;gap:1.2rem;transition:all .2s}
    .edu-card:hover{border-color:var(--accent2)}
    .edu-icon{width:44px;height:44px;border-radius:12px;background:rgba(123,94,167,.15);display:flex;align-items:center;justify-content:center;color:var(--accent2);font-size:1.2rem;flex-shrink:0}
    .edu-degree{font-weight:600;color:var(--text);font-size:.96rem;margin-bottom:2px}
    .edu-school{color:var(--muted);font-size:.85rem}
    .edu-year{margin-left:auto;font-size:.8rem;color:var(--accent2);font-weight:600;flex-shrink:0}
    #contact{max-width:720px;margin:0 auto}
    .contact-sub{color:var(--muted);text-align:center;margin-bottom:2.5rem;font-size:.95rem}
    .contact-form{width:100%;background:var(--bg2);border:1px solid var(--border);border-radius:20px;padding:2.5rem;display:flex;flex-direction:column;gap:1.5rem}
    .form-label{display:flex;align-items:center;gap:.5rem;font-weight:600;font-size:.92rem;margin-bottom:.55rem;color:var(--text)}
    .form-label i{color:var(--accent)}
    .form-input,.form-textarea{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:12px;padding:.85rem 1rem;color:var(--text);font-family:"Space Grotesk",sans-serif;font-size:0.95rem;transition:all 0.2s}
    .form-input::placeholder,.form-textarea::placeholder{color:var(--muted)}
    .form-input:focus,.form-textarea:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--glow);outline:none}
    .form-textarea{resize:vertical;min-height:140px}
    .submit-btn{width:100%;padding:.95rem;background:linear-gradient(135deg,var(--accent),var(--accent2));border:none;border-radius:12px;color:#fff;font-family:"Syne",sans-serif;font-weight:700;font-size:0.95rem;cursor:pointer;transition:all 0.3s}
    .submit-btn:hover{transform:translateY(-2px);box-shadow:0 8px 24px var(--glow)}
    .submit-btn:disabled{opacity:0.6;cursor:not-allowed;transform:none}
    .success-message{color:#4ade80;font-size:0.9rem;text-align:center;margin-top:1rem;display:none}
    .error-message{color:#f87171;font-size:0.9rem;text-align:center;margin-top:1rem;display:none}
    .settings-icon{color:var(--muted);font-size:1.1rem;cursor:pointer;transition:color 0.2s,transform 0.4s;padding:6px}
    .settings-icon:hover{color:var(--accent)}
    .settings-icon.spinning{transform:rotate(90deg)}
    .settings-wrapper{position:relative}
    .settings-panel{position:absolute;top:calc(100% + 12px);right:0;width:300px;background:var(--bg2);border:1px solid var(--border);border-radius:16px;box-shadow:0 12px 40px var(--shadow);padding:1.2rem;z-index:600;opacity:0;transform:translateY(-8px) scale(0.97);pointer-events:none;transition:opacity 0.2s ease,transform 0.2s ease;transform-origin:top right}
    .settings-panel.open{opacity:1;transform:translateY(0) scale(1);pointer-events:all}
    .panel-header{display:flex;align-items:center;gap:.6rem;margin-bottom:1rem;padding-bottom:.8rem;border-bottom:1px solid var(--border)}
    .panel-header span{font-family:"Syne",sans-serif;font-weight:700;font-size:.95rem;color:var(--text)}
    .panel-header i{color:var(--accent)}
    .panel-section{margin-bottom:.9rem}
    .panel-label{font-size:.68rem;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;margin-bottom:.5rem}
    .theme-toggle{display:flex;background:var(--bg3);border-radius:10px;padding:3px;gap:3px}
    .theme-btn{flex:1;padding:.45rem;border:none;border-radius:8px;font-family:"Space Grotesk",sans-serif;font-size:.82rem;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:.4rem;transition:all 0.2s;background:transparent;color:var(--muted)}
    .theme-btn.active{background:var(--accent);color:#fff;box-shadow:0 2px 8px var(--glow)}
    .theme-btn:not(.active):hover{color:var(--text);background:var(--border)}
    .clock-row{display:flex;align-items:center;gap:.8rem;padding:.7rem;background:var(--bg3);border-radius:10px}
    .clock-icon{width:34px;height:34px;border-radius:9px;background:rgba(79,142,247,.15);display:flex;align-items:center;justify-content:center;color:var(--accent);font-size:.95rem;flex-shrink:0}
    .clock-time{font-size:1.05rem;font-weight:700;color:var(--text);letter-spacing:.04em;font-variant-numeric:tabular-nums}
    .clock-date{font-size:.75rem;color:var(--muted);margin-top:1px}
    .panel-footer{text-align:center;font-size:.75rem;color:var(--muted);padding-top:.8rem;border-top:1px solid var(--border)}
    @media(max-width:700px){.info-grid{grid-template-columns:1fr 1fr}nav{padding:0 1.2rem}section{padding:90px 1.2rem 50px}}
    @media(max-width:450px){.info-grid{grid-template-columns:1fr}.contact-form{padding:1.5rem}.settings-panel{width:260px}}
    .scroll-bar{position:fixed;top:0;left:0;height:3px;background:linear-gradient(90deg,var(--accent),var(--accent2));z-index:999;transition:width 0.1s}
    .back-top{position:fixed;bottom:2rem;right:2rem;width:42px;height:42px;border-radius:50%;background:var(--accent);color:#fff;border:none;cursor:pointer;font-size:1.1rem;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 15px var(--glow);transition:all .3s;z-index:300;opacity:0;pointer-events:none}
    .back-top.visible{opacity:1;pointer-events:all}
    .back-top:hover{transform:translateY(-3px);box-shadow:0 8px 20px var(--glow)}
    .fade-section{opacity:0;transform:translateY(30px);transition:opacity .6s ease,transform .6s ease}
    .fade-section.visible{opacity:1;transform:translateY(0)}
    .rec-section{width:100%;max-width:700px;margin:2.5rem auto 0;text-align:center}
    .rec-title{font-family:"Syne",sans-serif;font-weight:700;font-size:1.4rem;color:var(--accent);margin-bottom:1.8rem}
    .rec-card{background:var(--bg2);border:1px solid var(--border);border-radius:20px;padding:2rem 2.5rem;position:relative;transition:all .3s;min-height:260px;display:flex;flex-direction:column;align-items:center;justify-content:center}
    .rec-card:hover{border-color:var(--accent);box-shadow:0 8px 30px var(--glow)}
    .rec-avatar-placeholder{width:72px;height:72px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;font-family:"Syne",sans-serif;font-weight:700;font-size:1.4rem;color:#fff;margin:0 auto 1rem;border:3px solid var(--accent)}
    .rec-name{font-family:"Syne",sans-serif;font-weight:700;font-size:1.05rem;color:var(--accent);margin-bottom:.25rem}
    .rec-role{font-size:.82rem;color:var(--muted);margin-bottom:1.2rem}
    .rec-quote-icon{font-size:1.8rem;color:var(--accent);opacity:.3;margin-bottom:.6rem;line-height:1}
    .rec-text{font-style:italic;color:var(--muted);line-height:1.8;font-size:.93rem}
    .rec-dots{display:flex;justify-content:center;gap:.5rem;margin-top:1.2rem}
    .rec-dot{width:28px;height:4px;border-radius:2px;background:var(--border);cursor:pointer;transition:all .3s}
    .rec-dot.active{background:var(--accent);width:40px}
  </style>
</head>

<script>
const canvas = document.getElementById("dotCanvas");
const ctx = canvas.getContext("2d");
let mouse = {x: window.innerWidth/2, y: window.innerHeight/2};
let dots = [];
const DOT_COUNT = 80;

function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resize();
window.addEventListener("resize", resize);
window.addEventListener("mousemove", e => { mouse.x = e.clientX; mouse.y = e.clientY; });

for (let i = 0; i < DOT_COUNT; i++) {
  dots.push({
    x: Math.random() * window.innerWidth,
    y: Math.random() * window.innerHeight,
    size: Math.random() * 2.5 + 1,
    speedX: (Math.random() - 0.5) * 0.4,
    speedY: (Math.random() - 0.5) * 0.4,
    opacity: Math.random() * 0.5 + 0.2
  });
}

function getAccentColor() {
  return document.body.classList.contains("light-mode")
    ? "45,110,232"
    : "79,142,247";
}

function animate() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  const color = getAccentColor();

  dots.forEach(dot => {
    const dx = mouse.x - dot.x;
    const dy = mouse.y - dot.y;
    const dist = Math.sqrt(dx*dx + dy*dy);
    const maxDist = 180;

    if (dist < maxDist) {
      const force = (maxDist - dist) / maxDist;
      dot.x += (dx / dist) * force * 1.8;
      dot.y += (dy / dist) * force * 1.8;
    }

    dot.x += dot.speedX;
    dot.y += dot.speedY;

    if (dot.x < 0) dot.x = canvas.width;
    if (dot.x > canvas.width) dot.x = 0;
    if (dot.y < 0) dot.y = canvas.height;
    if (dot.y > canvas.height) dot.y = 0;

    // Draw dot
    ctx.beginPath();
    ctx.arc(dot.x, dot.y, dot.size, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(${color},${dot.opacity})`;
    ctx.fill();

    // Draw lines to nearby dots
    dots.forEach(other => {
      const odx = dot.x - other.x;
      const ody = dot.y - other.y;
      const odist = Math.sqrt(odx*odx + ody*ody);
      if (odist < 100) {
        ctx.beginPath();
        ctx.moveTo(dot.x, dot.y);
        ctx.lineTo(other.x, other.y);
        ctx.strokeStyle = `rgba(${color},${0.08 * (1 - odist/100)})`;
        ctx.lineWidth = 0.6;
        ctx.stroke();
      }
    });
  });

  requestAnimationFrame(animate);
}
animate();
</script>
